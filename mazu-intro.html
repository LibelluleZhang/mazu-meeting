<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>妈祖 · AI国风诗选短剧</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&family=Inter:wght@400;500;600&display=swap');
  :root{--bg:#efe2d4;--ink:#33302e;--soft:#736a64;--faint:#867c75;--accent:#2f6e64;--asoft:#5d9a90;--gold:#c4956a;--red:#CC3F28;--hair:rgba(80,74,70,0.10);--serif:"Source Serif 4","Noto Serif SC","Songti SC","STSong",Georgia,serif;--sans:"Inter",-apple-system,sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  html{background:var(--bg)}
  body{color:var(--ink);font-family:var(--serif);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .container{max-width:560px;width:100%}

  header{text-align:center;margin-bottom:48px}
  header .tag{display:inline-block;font-family:var(--sans);font-size:10px;letter-spacing:.14em;color:var(--asoft);border:1px solid var(--asoft);border-radius:20px;padding:3px 14px;margin-bottom:20px}
  header h1{font-size:34px;font-weight:300;letter-spacing:.05em;line-height:1.4;margin-bottom:8px}
  header h1 span{color:var(--accent)}
  header .sub{font-size:15px;color:var(--soft);line-height:1.7;max-width:400px;margin:0 auto}

  .cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:36px}
  a.card{display:block;padding:32px 24px;border:1px solid var(--hair);border-radius:10px;text-decoration:none;transition:all .25s;background:rgba(255,253,250,.3)}
  a.card:hover{border-color:var(--accent);box-shadow:0 4px 24px rgba(0,0,0,.04);transform:translateY(-2px)}
  .card .icon{font-size:28px;margin-bottom:14px}
  .card h2{font-size:19px;font-weight:500;color:var(--ink);letter-spacing:.02em;margin-bottom:6px}
  .card .desc{font-size:13px;color:var(--soft);line-height:1.6;font-family:var(--sans)}
  .card .arrow{display:inline-block;margin-top:12px;font-size:12px;color:var(--accent);font-family:var(--sans)}

  .links{display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
  .links a{font-size:13px;color:var(--soft);text-decoration:none;font-family:var(--sans);border-bottom:1px dotted var(--hair);padding-bottom:1px}
  .links a:hover{color:var(--accent);border-color:var(--accent)}

  .kpi-row{display:flex;justify-content:center;gap:28px;margin-top:36px;padding-top:28px;border-top:1px solid var(--hair)}
  .kpi{text-align:center}
  .kpi .num{font-size:24px;font-weight:300;color:var(--accent);font-family:var(--sans)}
  .kpi .label{font-size:11px;color:var(--faint);font-family:var(--sans);letter-spacing:.05em;margin-top:2px}

  @media(max-width:520px){
    .cards{grid-template-columns:1fr}
    header h1{font-size:26px}
    header .sub{font-size:14px}
  }
</style>
</head>
<body>
<div class="container">

<header>
  <div class="tag">AI · 国风 · 诗选剧</div>
  <h1><span>妈祖</span> · 被接住的瞬间</h1>
  <p class="sub">妈祖是善意的化身。这个项目想延续这份善意。<br>千年IP，当代表达——希望帮助更多人。</p>
</header>

<div class="cards">
  <a href="mazu-pitch.html" class="card">
    <div class="icon">🤝</div>
    <h2>合作策划案</h2>
    <div class="desc">品牌合作 · 投资 · 资源对接<br>市场验证 · 五年路线 · 合作体系</div>
    <span class="arrow">了解项目 →</span>
  </a>
  <a href="mazu-recruit.html" class="card">
    <div class="icon">✍️</div>
    <h2>共创者招募</h2>
    <div class="desc">编剧 · 导演 · 艺术家 · 音乐人<br>69人社群等你加入</div>
    <span class="arrow">加入共创 →</span>
  </a>
</div>

<div class="links">
  <a href="https://libellulezhang.github.io/mazu-knowledge/" target="_blank">知识库</a>
  <a href="mazu-0614-meeting.html">6/14会议纪要</a>
  <a href="mazu-tinghai.html">妈祖听海</a>
  <a href="https://mazu-throw.surge.sh" target="_blank">掷圣杯</a>
</div>

<div class="kpi-row">
  <div class="kpi"><div class="num">69人</div><div class="label">社群</div></div>
  <div class="kpi"><div class="num">24集</div><div class="label">3-5分/集</div></div>
  <div class="kpi"><div class="num">1000年</div><div class="label">IP</div></div>
  <div class="kpi"><div class="num">49国</div><div class="label">全球</div></div>
</div>

</div>
</body>
</html>
