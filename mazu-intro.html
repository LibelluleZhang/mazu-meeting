<style>
  :root{--bg:#efe2d4;--ink:#33302e;--soft:#6b625c;--faint:#8b827c;--accent:#2f6e64;--asoft:#5d9a90;--gold:#c4956a;--red:#c4706e;--hair:rgba(80,74,70,0.10);--card:rgba(255,253,250,0.45)}
  *{margin:0;padding:0;box-sizing:border-box}
  html{background:var(--bg);-webkit-text-size-adjust:100%}
  body{color:var(--ink);font-family:"Noto Serif SC","Songti SC","STSong","Source Serif 4",Georgia,"Times New Roman",serif;-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.85}
  article{max-width:560px;margin:0 auto;padding:64px 28px 80px}

  header{text-align:center;margin-bottom:52px}
  header .tag{display:inline-block;font-size:10px;letter-spacing:.15em;color:var(--asoft);border:1px solid var(--asoft);border-radius:20px;padding:4px 16px;margin-bottom:20px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}

  header h1 span{color:var(--accent);font-weight:400}
  header .sub{font-size:14px;color:var(--soft);line-height:1.75}

  .cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:40px}
  a.card{display:block;padding:32px 24px;border:1px solid var(--hair);border-radius:12px;text-decoration:none;transition:all .3s cubic-bezier(.4,0,.2,1);background:var(--card);position:relative;overflow:hidden}
  a.card::after{content:'';position:absolute;inset:0;background:var(--accent);opacity:0;transition:opacity .3s;z-index:0}
  a.card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.06);border-color:var(--asoft)}
  a.card:hover::after{opacity:.02}
  .card>*{position:relative;z-index:1}
  .card .icon{font-size:28px;margin-bottom:12px;display:block}
  .card h2{font-size:18px;font-weight:500;color:var(--ink);letter-spacing:.02em;margin-bottom:4px}
  .card .desc{font-size:12px;color:var(--soft);line-height:1.6;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
  .card .arrow{display:inline-block;margin-top:12px;font-size:11px;color:var(--accent);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;letter-spacing:.04em;transition:transform .2s}
  a.card:hover .arrow{transform:translateX(4px)}

  .links{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:36px}
  .links a{font-size:12px;color:var(--soft);text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;transition:color .2s;padding:2px 0;border-bottom:1px solid transparent}
  .links a:hover{color:var(--accent);border-color:var(--accent)}

  .kpi-row{display:flex;justify-content:center;gap:32px;padding-top:28px;border-top:1px solid var(--hair);flex-wrap:wrap}
  .kpi{text-align:center}
  .kpi .num{font-size:24px;font-weight:300;color:var(--accent);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.1}
  .kpi .label{font-size:10px;color:var(--faint);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;letter-spacing:.06em;margin-top:3px;text-transform:uppercase}

  @media(max-width:500px){
    article{padding:48px 18px 72px}
    .cards{grid-template-columns:1fr}
    .kpi-row{gap:24px}
  }
</style>
