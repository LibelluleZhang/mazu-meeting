<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>妈祖听海</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#0d1b2a;font-family:"Songti SC","STSong","PingFang SC",serif;
    height:100vh;height:100dvh;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;
  }
  .container{
    width:100%;max-width:450px;height:100vh;height:100dvh;position:relative;overflow:hidden;
    background:linear-gradient(180deg,#0d1b2a 0%,#162438 35%,#1e3a5c 100%);
  }

  /* Ocean */
  .ocean{position:absolute;bottom:0;left:0;right:0;height:40%;overflow:hidden}
  .wave{position:absolute;bottom:0;left:-50%;width:200%;height:100%}
  .wave:nth-child(1){background:radial-gradient(ellipse at 30% 100%,rgba(180,210,240,.35) 0%,transparent 55%);animation:wave1 9s ease-in-out infinite}
  .wave:nth-child(2){background:radial-gradient(ellipse at 70% 100%,rgba(160,200,230,.2) 0%,transparent 55%);animation:wave2 12s ease-in-out infinite}
  .wave:nth-child(3){background:radial-gradient(ellipse at 50% 100%,rgba(140,185,220,.12) 0%,transparent 55%);animation:wave3 15s ease-in-out infinite}
  @keyframes wave1{0%,100%{transform:translateY(0)translateX(0)}50%{transform:translateY(-10px)translateX(3%)}}
  @keyframes wave2{0%,100%{transform:translateY(0)translateX(0)}50%{transform:translateY(-6px)translateX(-2%)}}
  @keyframes wave3{0%,100%{transform:translateY(0)translateX(0)}50%{transform:translateY(-4px)translateX(1%)}}

  /* Stars */
  .stars{position:absolute;top:0;left:0;right:0;height:60%}
  .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.9}}

  /* Moon */
  .moon{position:absolute;top:12%;left:50%;transform:translateX(-50%);width:48px;height:48px;background:radial-gradient(circle,rgba(255,245,220,.7) 0%,rgba(255,245,220,.15) 45%,transparent 65%);border-radius:50%;transition:all 1.2s ease}
  .moon.brighter{box-shadow:0 0 40px rgba(255,245,220,.25),0 0 80px rgba(255,245,220,.1)}
  .moon-reflection{position:absolute;bottom:32%;left:50%;transform:translateX(-50%);width:80px;height:4px;background:linear-gradient(90deg,transparent,rgba(255,245,220,.15),transparent);border-radius:2px;animation:shimmer 4s ease-in-out infinite}
  @keyframes shimmer{0%,100%{opacity:.25;width:60px}50%{opacity:.6;width:100px}}

  /* Flying lantern */
  .lantern-fly{position:absolute;font-size:28px;z-index:20;pointer-events:none;animation:flyUp 4s ease-out forwards;opacity:0}
  @keyframes flyUp{0%{opacity:.9;transform:translateY(0)scale(.6)}30%{opacity:1;transform:translateY(-80px)scale(1)}100%{opacity:0;transform:translateY(-300px)scale(.4)}}

  /* Content */
  .content{position:relative;z-index:10;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px}

  /* Phase 1 */
  .phase-prompt{text-align:center;width:100%}
  .phase-prompt .title{font-size:22px;font-weight:300;color:rgba(255,255,255,.85);letter-spacing:.12em;margin-bottom:6px;line-height:1.6}
  .phase-prompt .subtitle{font-size:13px;color:rgba(255,255,255,.3);letter-spacing:.2em;margin-bottom:32px}

  /* Quick-tap chips */
  .chips{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:20px}
  .chip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);padding:10px 18px;border-radius:20px;font-size:14px;font-family:inherit;cursor:pointer;transition:all .25s;letter-spacing:.05em;-webkit-tap-highlight-color:transparent}
  .chip:active,.chip:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.85);transform:scale(1.04)}
  .chip.selected{background:rgba(255,255,255,.15);border-color:rgba(255,245,220,.4);color:#fff}

  /* Input */
  .input-wrap{margin-top:8px;width:100%;position:relative}
  .input-wrap input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:14px 20px;font-size:16px;font-family:inherit;color:rgba(255,255,255,.85);letter-spacing:.06em;outline:none;text-align:center;transition:border-color .3s}
  .input-wrap input::placeholder{color:rgba(255,255,255,.18)}
  .input-wrap input:focus{border-color:rgba(255,245,220,.35)}

  /* Submit */
  .submit-btn{margin-top:16px;background:none;border:1px solid rgba(255,245,220,.25);color:rgba(255,245,220,.6);padding:12px 40px;font-size:15px;font-family:inherit;letter-spacing:.15em;border-radius:24px;cursor:pointer;transition:all .3s;-webkit-tap-highlight-color:transparent}
  .submit-btn:active,.submit-btn:hover{border-color:rgba(255,245,220,.5);color:rgba(255,245,220,.9);background:rgba(255,245,220,.05)}
  .counter-text{margin-top:36px;font-size:12px;color:rgba(255,255,255,.18);letter-spacing:.1em}

  /* Phase 3 */
  .phase-response{display:none;text-align:center;width:100%}
  .response-icon{font-size:44px;margin-bottom:20px;animation:gentlePulse 3s ease-in-out infinite}
  @keyframes gentlePulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.85;transform:scale(1.06)}}
  .response-line{font-size:18px;font-weight:300;color:rgba(255,255,255,.8);letter-spacing:.1em;line-height:1.9;margin-bottom:36px}
  .response-counter{font-size:12px;color:rgba(255,255,255,.22);letter-spacing:.1em;margin-bottom:24px}
  .again-btn{background:none;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.35);padding:10px 28px;font-size:13px;font-family:inherit;letter-spacing:.15em;border-radius:20px;cursor:pointer;transition:all .3s}
  .again-btn:active,.again-btn:hover{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.65)}

  /* Lantern icon */
  .lantern-corner{position:absolute;top:20px;right:24px;font-size:22px;opacity:.25;animation:sway 4s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
  .close-hint{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.12);letter-spacing:.12em}
  .fade-in{animation:fadeIn 1.2s ease forwards}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container" id="container">
  <div class="ocean"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
  <div class="stars" id="stars"></div>
  <div class="moon" id="moon"></div>
  <div class="moon-reflection"></div>
  <div class="lantern-corner">🏮</div>

  <div class="content" id="content">

    <div class="phase-prompt fade-in" id="phase-prompt">
      <div class="title">今天想对妈祖说的话</div>
      <div class="subtitle">她都听着</div>

      <div class="chips" id="chips">
        <button class="chip" onclick="selectChip(this,'累')">累</button>
        <button class="chip" onclick="selectChip(this,'想放下')">想放下</button>
        <button class="chip" onclick="selectChip(this,'求平安')">求平安</button>
        <button class="chip" onclick="selectChip(this,'想被接住')">想被接住</button>
        <button class="chip" onclick="selectChip(this,'焦虑')">焦虑</button>
        <button class="chip" onclick="selectChip(this,'求勇气')">求勇气</button>
        <button class="chip" onclick="selectChip(this,'想通了')">想通了</button>
        <button class="chip" onclick="selectChip(this,'感恩')">感恩</button>
      </div>

      <div class="input-wrap">
        <input type="text" id="worry-input" placeholder="或写你想说的……" maxlength="50" autocomplete="off">
      </div>
      <button class="submit-btn" id="submit-btn" onclick="offer()">说给妈祖听</button>
      <div class="counter-text" id="counter-text">今夜已有 <span id="count-num">0</span> 人向妈祖说了心事</div>
    </div>

    <div class="phase-response" id="phase-response">
      <div class="response-icon">🕯️</div>
      <div class="response-line" id="response-line"></div>
      <div class="response-counter" id="response-counter"></div>
      <button class="again-btn" onclick="reset()">再留一件</button>
    </div>

  </div>
  <div class="close-hint" id="close-hint">截屏分享 · 或直接关闭</div>
</div>

<script>
// Stars
(function(){
  const s=document.getElementById('stars');let h='';
  for(let i=0;i<45;i++){
    const x=Math.random()*100,y=Math.random()*100,d=Math.random()*3,s=Math.random()*1.5+.4;
    h+=`<div class="star" style="left:${x}%;top:${y}%;width:${s}px;height:${s}px;animation-delay:${d}s"></div>`;
  }
  s.innerHTML=h;
})();

// Ocean wave ambience
let waveAudio=null;
function startWaves(){
  try{
    const ctx=new AudioContext();
    const buflen=ctx.sampleRate*4;
    const buf=ctx.createBuffer(1,buflen,ctx.sampleRate);
    const ch=buf.getChannelData(0);
    let last=0;
    for(let i=0;i<buflen;i++){
      const white=Math.random()*2-1;
      last=(last+(0.02*white))/1.02;
      ch[i]=last*0.12*Math.sin(i*0.00003);
    }
    const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;
    const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=400;
    const gain=ctx.createGain();gain.gain.value=0.08;
    src.connect(lp);lp.connect(gain);gain.connect(ctx.destination);
    src.start();
    waveAudio={ctx,src,gain};
  }catch(e){}
}
function ensureAudio(){if(!waveAudio)startWaves();else waveAudio.ctx.resume();}
let audioStarted=false;
['click','touchstart'].forEach(e=>document.addEventListener(e,()=>{if(!audioStarted){audioStarted=true;ensureAudio();}}));

// Counter
let offerCount=parseInt(localStorage.getItem('mazu_count')||'0');
function updateCounter(){
  offerCount++;localStorage.setItem('mazu_count',offerCount);
  const d=offerCount+Math.floor(Math.random()*7);
  document.getElementById('count-num').textContent=d;
  document.getElementById('response-counter').textContent='今夜已有 '+d+' 人向妈祖说了心事';
}

// Chip selection
let selectedChip=null;
function selectChip(el,word){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));
  if(selectedChip===el){selectedChip=null;el.classList.remove('selected');return}
  selectedChip=el;el.classList.add('selected');
  document.getElementById('worry-input').value=word;
}

// Mazu responses
const responses=[
  '妈祖收下了。<br>明天海面会很平。',
  '妈祖听见了。<br>潮水每天都是新的。',
  '妈祖看见了。<br>你不需要一个人扛。',
  '妈祖说：<br>这个浪过了，下一个不会更高。',
  '妈祖记下了。<br>风会带走该走的。',
  '妈祖知道。<br>月亮不问你为什么难过，它只是照着。',
  '妈祖收了。<br>天亮之前，海替你守着。',
  '妈祖听见了。<br>你比你以为的更勇敢。',
];

// Bell chime
function chime(){
  try{
    const a=new AudioContext(),o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.setValueAtTime(880,a.currentTime);
    o.frequency.setValueAtTime(1100,a.currentTime+.08);
    g.gain.setValueAtTime(.15,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.6);
    o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.6);
  }catch(e){}
}

// Floating lantern
function launchLantern(text){
  const l=document.createElement('div');
  l.className='lantern-fly';
  l.textContent='🏮';
  l.style.left=(40+Math.random()*20)+'%';
  l.style.bottom='30%';
  document.getElementById('container').appendChild(l);
  setTimeout(()=>l.remove(),4200);
}

function offer(){
  const input=document.getElementById('worry-input');
  const text=input.value.trim();
  if(!text){input.placeholder='写点什么吧…';input.focus();return}

  document.getElementById('phase-prompt').style.opacity='0';
  document.getElementById('phase-prompt').style.transition='opacity .6s';
  document.getElementById('close-hint').style.opacity='0';

  // Dissolve text
  const d=document.createElement('div');
  d.style.cssText='position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-size:20px;color:rgba(255,255,255,.5);letter-spacing:.12em;pointer-events:none;z-index:15;animation:dissolveAnim 2.5s ease-in forwards;white-space:nowrap';
  d.textContent=text.length>12?text.substring(0,12)+'…':text;

  const style=document.createElement('style');
  style.textContent='@keyframes dissolveAnim{0%{opacity:.7;transform:translate(-50%,-50%)}40%{opacity:.3;transform:translate(-50%,-60%)}100%{opacity:0;transform:translate(-50%,80%)}}';
  document.head.appendChild(style);
  document.getElementById('container').appendChild(d);

  updateCounter();chime();

  setTimeout(()=>{
    d.remove();style.remove();
    launchLantern(text);
    document.getElementById('moon').classList.add('brighter');

    document.getElementById('phase-prompt').style.display='none';
    const r=document.getElementById('phase-response');
    r.style.display='block';r.classList.add('fade-in');
    document.getElementById('response-line').innerHTML=responses[Math.floor(Math.random()*responses.length)];
    updateCounter();document.getElementById('close-hint').style.opacity='1';
  },2300);
}

function reset(){
  const pp=document.getElementById('phase-prompt'),pr=document.getElementById('phase-response');
  pr.style.display='none';pr.classList.remove('fade-in');
  pp.style.display='block';pp.style.opacity='1';
  document.getElementById('worry-input').value='';
  document.getElementById('moon').classList.remove('brighter');
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));
  selectedChip=null;
}

document.getElementById('worry-input').addEventListener('keydown',e=>{if(e.key==='Enter')offer()});
updateCounter();
</script>
</body>
</html>
